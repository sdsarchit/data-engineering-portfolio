# Google App Engine Standard Deployment Configuration
# Deploy using: gcloud app deploy backend/app.yaml

runtime: python312
instance_class: F1

# Use Gunicorn as the production WSGI server
entrypoint: gunicorn -b :$PORT app:app

# Restrict standard environment to 1 instance to maintain a single SQLite state
automatic_scaling:
  max_instances: 1

env_variables:
  FLASK_ENV: "production"
  
  # NOTE: Replace with your actual Firebase Hosting project ID
  # to restrict cross-origin API calls exclusively to your frontend domain.
  ALLOWED_ORIGIN: "https://archit-de-portfolio-8902.web.app"
